{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode hors ligne - Luxious Beautyland</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full text-center">
            <div class="text-primary mb-4">
                <i class="fas fa-wifi-slash text-6xl"></i>
            </div>
            
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Mode hors ligne</h1>
            
            <p class="text-gray-600 mb-6">
                Vous êtes actuellement hors ligne. Pas d'inquiétude, vous pouvez toujours :
            </p>
            
            <div class="space-y-4 mb-8">
                <a href="/" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-800 py-3 px-4 rounded-lg transition-colors">
                    <i class="fas fa-home mr-2"></i> Retourner à l'accueil
                </a>
                
                <a href="/Product/" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-800 py-3 px-4 rounded-lg transition-colors">
                    <i class="fas fa-box mr-2"></i> Voir les Product en cache
                </a>
                
                <a href="/contact/" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-800 py-3 px-4 rounded-lg transition-colors">
                    <i class="fas fa-envelope mr-2"></i> Nous contacter plus tard
                </a>
            </div>
            
            <div class="text-sm text-gray-500">
                <p>Reconnectez-vous à Internet pour accéder à toutes les fonctionnalités.</p>
                
                <button onclick="window.location.reload()" class="mt-4 text-primary hover:text-secondary transition-colors">
                    <i class="fas fa-sync-alt mr-1"></i> Réessayer
                </button>
            </div>
            
            <div class="mt-6 pt-6 border-t border-gray-200">
                <img src="{% static 'images/logo.png' %}" alt="Luxious Beautyland" class="h-8 mx-auto">
            </div>
        </div>
    </div>
</body>
</html>
