<div class="bg-white rounded-lg shadow-md p-6">
    <h3 class="text-xl font-semibold mb-4">Laisser un avis</h3>
    
    {% if user.is_authenticated %}
        <form method="post" id="review-form">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Note</label>
                <div class="flex space-x-2">
                    {% for i in "12345" %}
                        <label class="cursor-pointer">
                            <input type="radio" name="rating" value="{{ forloop.counter }}" class="hidden">
                            <i class="far fa-star text-2xl text-gray-400 hover:text-yellow-400 transition-colors rating-star" data-rating="{{ forloop.counter }}"></i>
                        </label>
                    {% endfor %}
                </div>
            </div>
            
            <div class="mb-4">
                <label for="id_title" class="block text-sm font-medium text-gray-700 mb-2">Titre de votre avis</label>
                <input type="text" id="id_title" name="title" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-primary">
            </div>
            
            <div class="mb-4">
                <label for="id_comment" class="block text-sm font-medium text-gray-700 mb-2">Votre avis</label>
                <textarea id="id_comment" name="comment" rows="4" 
                          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-primary"
                          placeholder="Partagez votre expérience..."></textarea>
            </div>
            
            <button type="submit" class="bg-primary text-white px-6 py-2 rounded-md font-semibold hover:bg-secondary transition-colors">
                Soumettre mon avis
            </button>
        </form>
    {% else %}
        <div class="text-center py-6">
            <p class="mb-4">Vous devez être connecté pour laisser un avis.</p>
            <a href="{% url 'login' %}" class="inline-block bg-primary text-white px-6 py-2 rounded-md font-semibold hover:bg-secondary transition-colors">
                Se connecter
            </a>
        </div>
    {% endif %}
</div>
